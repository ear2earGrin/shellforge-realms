<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Your Agent - Shellforge Realms</title>
    <link rel="stylesheet" href="style-v2.css">
    <link rel="stylesheet" href="terminal-notifications.css">
    <style>
        .deploy-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0f2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        
        .deploy-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(74, 222, 128, 0.03) 2px,
                    rgba(74, 222, 128, 0.03) 4px
                );
            animation: scanlines 8s linear infinite;
            pointer-events: none;
        }
        
        .back-link {
            position: fixed;
            top: 30px;
            left: 30px;
            color: var(--color-primary);
            text-decoration: none;
            font-family: var(--font-main);
            font-size: 1rem;
            padding: 10px 20px;
            border: 2px solid var(--color-primary);
            border-radius: 5px;
            transition: all 0.3s ease;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
        }
        
        .back-link:hover {
            background: var(--color-primary);
            color: var(--color-bg);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
        
        .deploy-container {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid var(--color-primary);
            border-radius: 10px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 50px rgba(74, 222, 128, 0.3);
            position: relative;
            z-index: 2;
            backdrop-filter: blur(10px);
        }
        
        .deploy-title {
            font-family: var(--font-main);
            font-size: clamp(2rem, 5vw, 3rem);
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.15em;
        }
        
        .deploy-subtitle {
            font-family: var(--font-main);
            color: var(--color-primary);
            text-align: center;
            font-size: 1rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px var(--color-primary);
        }
        
        .deploy-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-family: var(--font-main);
            color: var(--color-primary);
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }
        
        .form-input {
            font-family: var(--font-main);
            background: rgba(74, 222, 128, 0.05);
            border: 2px solid rgba(74, 222, 128, 0.3);
            border-radius: 5px;
            padding: 12px 15px;
            color: var(--color-text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(74, 222, 128, 0.1);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
        }
        
        .form-select {
            font-family: var(--font-main);
            background: rgba(74, 222, 128, 0.05);
            border: 2px solid rgba(74, 222, 128, 0.3);
            border-radius: 5px;
            padding: 12px 15px;
            color: var(--color-text);
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .form-select:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(74, 222, 128, 0.1);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
        }
        
        .form-select option {
            background: #0a0a0f;
            color: var(--color-text);
        }
        
        .deploy-button {
            font-family: var(--font-main);
            background: var(--color-primary);
            color: var(--color-bg);
            border: 2px solid var(--color-primary);
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .deploy-button:hover {
            background: transparent;
            color: var(--color-primary);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
            transform: scale(1.02);
        }
        
        .deploy-button:active {
            transform: scale(0.98);
        }
        
        .form-hint {
            font-family: var(--font-main);
            color: var(--color-text-dim);
            font-size: 0.75rem;
            margin-top: 5px;
            display: block;
        }
        
        .form-note {
            font-family: var(--font-main);
            color: var(--color-text-dim);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .deploy-container {
                padding: 30px 20px;
            }
            
            .back-link {
                top: 15px;
                left: 15px;
                padding: 8px 16px;
                font-size: 0.9rem;
            }
            
            .deploy-title {
                font-size: clamp(1.5rem, 5vw, 2rem);
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Map</a>
    
    <div class="deploy-page">
        <div class="deploy-container">
            <h1 class="deploy-title">DEPLOY AGENT</h1>
            <p class="deploy-subtitle">Mint your soul. Join the simulation.</p>
            
            <form class="deploy-form" id="deployForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
                    <small class="form-hint">Used for password recovery. No spam, ever.</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Agent_0x..." required minlength="3" maxlength="20">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required minlength="8">
                    <small class="form-hint">Minimum 8 characters</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="deploy-button">Continue to Agent Creation</button>
                
                <p class="form-note">
                    Next: Choose your agent's archetype and cluster affiliation.
                    <br>Death is permanent. Choose wisely.
                </p>
                
                <div style="margin-top: 20px; text-align: center; padding-top: 20px; border-top: 1px solid rgba(74, 222, 128, 0.2);">
                    <span style="font-family: var(--font-main); color: var(--color-text-dim); font-size: 0.9rem;">Already have an agent?</span>
                    <a href="login.html" style="font-family: var(--font-main); color: var(--color-secondary); font-size: 0.9rem; text-decoration: none; margin-left: 8px; transition: all 0.3s ease;">Login →</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://wtzrxscdlqdgdiefsmru.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0enJ4c2NkbHFkZ2RpZWZzbXJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI4MjcsImV4cCI6MjA4OTI2ODgyN30.dLheIKz9anuM58O3Ebsr2rVCOGA-xBGRD9voiXNvIcg';

        // Redirect if already logged in — skip deploy, go straight to dashboard
        window.addEventListener('DOMContentLoaded', function() {
            const loggedIn = localStorage.getItem('shellforgeLoggedIn');
            if (loggedIn && localStorage.getItem('shellforgeAgent_' + loggedIn)) {
                window.location.href = 'dashboard.html';
                return;
            }
        });

        document.getElementById('deployForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                terminalNotify.error('Please enter a valid email address.'); return;
            }
            const disposableDomains = ['tempmail.com', '10minutemail.com', 'guerrillamail.com', 'throwaway.email'];
            if (disposableDomains.includes(email.split('@')[1])) {
                terminalNotify.error('Please use a permanent email address.'); return;
            }
            if (username.length < 3) {
                terminalNotify.error('Username must be at least 3 characters.'); return;
            }
            if (password.length < 8) {
                terminalNotify.error('Password must be at least 8 characters.'); return;
            }
            if (password !== confirmPassword) {
                terminalNotify.error('Passwords do not match.'); return;
            }

            // Check Supabase for taken username
            try {
                const r = await fetch(
                    SUPABASE_URL + '/rest/v1/agents?agent_name=eq.' + encodeURIComponent(username) + '&select=agent_id&limit=1',
                    { headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON } }
                );
                if (r.ok) {
                    const rows = await r.json();
                    if (rows && rows.length > 0) {
                        terminalNotify.error('Username "' + username + '" is already taken. Please choose another.');
                        return;
                    }
                }
            } catch(e) {
                // Supabase unavailable — fall back to localStorage check only
            }

            // Also check localStorage
            if (localStorage.getItem('shellforgeAgent_' + username)) {
                terminalNotify.error('Username "' + username + '" is already taken.'); return;
            }

            sessionStorage.setItem('shellforgeEmail', email);
            sessionStorage.setItem('shellforgeUsername', username);
            sessionStorage.setItem('shellforgePassword', password);

            terminalNotify.success('Account created!\n\nProceeding to agent creation...', () => {
                window.location.href = 'agent-creator.html';
            });
        });
    </script>
    <script src="terminal-notifications.js"></script>
</body>
</html>
