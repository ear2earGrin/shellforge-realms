<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Netherveil — Medieval Cyberpunk City</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Segoe UI',Arial,sans-serif;color:#c8d0e0}
canvas{display:block;width:100%;height:100%;image-rendering:auto}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a12;z-index:999;transition:opacity .6s}
#loading h1{font-size:2.4rem;letter-spacing:.2em;color:#8af;text-shadow:0 0 30px #48f}
#loading p{margin-top:12px;font-size:1rem;color:#668}
#loading .bar{width:240px;height:4px;background:#1a1a2e;border-radius:2px;margin-top:18px;overflow:hidden}
#loading .fill{height:100%;width:0%;background:linear-gradient(90deg,#48f,#8af);transition:width .3s}
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
#minimap{position:fixed;top:16px;right:16px;display:none;border:2px solid #334;border-radius:6px;background:rgba(10,10,18,.85);z-index:11;pointer-events:auto}
#minimapLabel{position:fixed;top:2px;right:16px;display:none;font-size:10px;color:#556;letter-spacing:.15em;z-index:12;text-align:center;pointer-events:none}
#discovery{position:fixed;top:16px;left:16px;font-size:14px;color:#8af;z-index:11;text-shadow:0 0 8px #48f}
#districtPopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,12,24,.92);border:1px solid #48f;border-radius:12px;padding:28px 36px;max-width:420px;text-align:center;z-index:20;display:none;pointer-events:auto;backdrop-filter:blur(8px)}
#districtPopup h2{color:#8af;font-size:1.3rem;margin-bottom:8px;text-shadow:0 0 12px #48f}
#districtPopup p{color:#99a;font-size:.92rem;line-height:1.6}
#districtPopup .close{margin-top:16px;cursor:pointer;color:#556;font-size:.8rem}
#controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:12px;color:#445;z-index:11;white-space:nowrap}
#devOverlay{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:12px;color:#4f8;z-index:11;display:none;font-family:monospace}
#interactHint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:13px;color:#8af;z-index:11;display:none;text-shadow:0 0 8px #48f;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
#touchDpad{position:fixed;bottom:20px;left:20px;z-index:15;display:none;pointer-events:auto}
#touchDpad button{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(40,50,80,.5);border:1px solid rgba(100,140,255,.3);color:#8af;font-size:20px;backdrop-filter:blur(4px);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#touchInteract{position:fixed;bottom:30px;right:30px;width:60px;height:60px;border-radius:50%;background:rgba(60,80,140,.5);border:2px solid rgba(100,140,255,.4);color:#8af;font-size:16px;font-weight:bold;z-index:15;display:none;pointer-events:auto;touch-action:manipulation;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
</style>
</head>
<body>
<div id="loading"><h1>NETHERVEIL</h1><p>Loading sprites...</p><div class="bar"><div class="fill" id="loadFill"></div></div></div>
<canvas id="c"></canvas>
<div id="hud"></div>
<canvas id="minimap" width="160" height="160"></canvas>
<div id="minimapLabel">MAP</div>
<div id="discovery"></div>
<div id="districtPopup"><h2 id="popTitle"></h2><p id="popLore"></p><div class="close" id="popClose">[ close ]</div></div>
<div id="controls"></div>
<div id="devOverlay"></div>
<div id="interactHint"></div>
<div id="touchDpad">
  <button style="left:52px;top:0px" id="tbUp">&#9650;</button>
  <button style="left:0px;top:52px" id="tbLeft">&#9664;</button>
  <button style="left:104px;top:52px" id="tbRight">&#9654;</button>
  <button style="left:52px;top:104px" id="tbDown">&#9660;</button>
</div>
<button id="touchInteract">E</button>
<script type="module">
import{STR}from"./strings.js";

/* ── CONSTANTS ── */
const TW=192,TH=96,MAP=120;
const PLAYER_SPEED=4.5;
const NPC_COUNT=40;
const RAIN_COUNT=180;
const DEV=new URLSearchParams(location.search).has("dev");

/* ── SPRITE LOADING ── */
const SPRITE_FILES={
  tavern:"./assets/tavern_v2.png",
  house_a:"./assets/house_a_v2.png",
  house_b:"./assets/house_b_v2.png",
  house_c:"./assets/house_c_v2.png",
  foundry:"./assets/foundry_v2.png",
  church:"./assets/church_v2.png",
  cathedral:"./assets/cathedral_v2.png",
  wall:"./assets/wall_v2.png",
  slum_tenement:"./assets/slum_tenement.png",
  foundry_v2:"./assets/foundry_v2.png",
  cathedral_v3:"./assets/cathedral_v3.png",
  obelisk:"./assets/obelisk.png",
  clock_church:"./assets/clock_church.png",
  house_d:"./assets/house_d.png",
  well:"./assets/well.png",
  black_market:"./assets/black_market.png",
  ground_cobble:"./assets/ground_cobble.png",
  ground_neon:"./assets/ground_neon.png",
  ground_plaza:"./assets/ground_plaza.png",
  ground_dirt:"./assets/ground_dirt.png",
  ground_puddle:"./assets/ground_puddle.png",
  ground_grate:"./assets/ground_grate.png"
};
const sprites={};
const fillEl=document.getElementById("loadFill");
let loadCount=0;const totalSprites=Object.keys(SPRITE_FILES).length;

function loadSprite(name,src){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{sprites[name]=img;loadCount++;fillEl.style.width=((loadCount/totalSprites)*100)+"%";res()};
    img.onerror=()=>{console.warn("Failed to load sprite: "+name);res()};
    img.src=src;
  });
}

await Promise.all(Object.entries(SPRITE_FILES).map(([n,s])=>loadSprite(n,s)));

/* ── CANVAS SETUP ── */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener("resize",resize);

/* ── COORDINATE TRANSFORMS ── */
function toScreen(tx,ty){return{x:(tx-ty)*(TW/2),y:(tx+ty)*(TH/2)}}
function toWorld(sx,sy){return{x:(sx/(TW/2)+sy/(TH/2))/2,y:(sy/(TH/2)-sx/(TW/2))/2}}

/* ── LANDMARKS ── */
const LANDMARKS=[
  {key:"cathedral",name:STR.cathedral,lore:STR.lore_cathedral,tx:60,ty:20,sprite:"cathedral_v3",scale:1.5},
  {key:"arena",name:STR.arena,lore:STR.lore_arena,tx:85,ty:30,sprite:"slum_tenement",scale:1.5},
  {key:"watchtower",name:STR.watchtower,lore:STR.lore_watchtower,tx:25,ty:45,sprite:"house_c",scale:1.5},
  {key:"market",name:STR.market,lore:STR.lore_market,tx:58,ty:52,sprite:"obelisk",scale:1.5},
  {key:"church",name:STR.church,lore:STR.lore_church,tx:78,ty:58,sprite:"clock_church",scale:1.5},
  {key:"foundry",name:STR.foundry,lore:STR.lore_foundry,tx:40,ty:70,sprite:"foundry_v2",scale:1.5},
  {key:"tavern",name:STR.tavern,lore:STR.lore_tavern,tx:62,ty:85,sprite:"tavern",scale:1.5}
];

/* ── MAP GENERATION ── */
// 0=forest, 1=road/walkable, 2=building, 3=wall, 4=water
const map=new Uint8Array(MAP*MAP);
const buildingSpriteMap=new Uint8Array(MAP*MAP); // 0=none,1=tavern,2=house_a,3=house_b,4=house_c,5=foundry,6=church,7=cathedral,8=wall
const SPRITE_INDEX=["","tavern","house_a","house_b","house_c","foundry","church","cathedral","wall","slum_tenement","foundry_v2","cathedral_v3","obelisk","clock_church","house_d","well","black_market"];

function idx(x,y){return y*MAP+x}
function inBounds(x,y){return x>=0&&x<MAP&&y>=0&&y<MAP}

// Seed random
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng=mulberry32(42);

// Fill forest
map.fill(0);

// City bounds
const CX=60,CY=55,CR=35;

// Water in northeast
for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++){
  const dx=x-100,dy=y-15;
  if(dx*dx+dy*dy<12*12)map[idx(x,y)]=4;
}

// Mark city area
for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++){
  if(map[idx(x,y)]===4)continue;
  const dx=x-CX,dy=y-CY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<CR-2){
    map[idx(x,y)]=rng()<0.35?2:1;
  }else if(dist<CR){
    map[idx(x,y)]=3;
  }
}

// Roads (Bresenham-ish thick)
function road(x0,y0,x1,y1){
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy,cx=x0,cy=y0;
  while(true){
    for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){
      const nx=cx+ox,ny=cy+oy;
      if(inBounds(nx,ny)&&map[idx(nx,ny)]!==4&&map[idx(nx,ny)]!==3)map[idx(nx,ny)]=1;
    }
    if(cx===x1&&cy===y1)break;
    const e2=2*err;
    if(e2>-dy){err-=dy;cx+=sx}
    if(e2<dx){err+=dx;cy+=sy}
  }
}

const roadPairs=[[62,85,58,52],[58,52,60,20],[58,52,40,70],[58,52,78,58],[58,52,25,45],[60,20,85,30],[78,58,85,30],[40,70,62,85]];
roadPairs.forEach(r=>road(r[0],r[1],r[2],r[3]));

// Clear landmark centers
LANDMARKS.forEach(lm=>{
  for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){
    const nx=lm.tx+ox,ny=lm.ty+oy;
    if(inBounds(nx,ny)){
      if(ox===0&&oy===0){
        map[idx(nx,ny)]=2;
      }else{
        if(map[idx(nx,ny)]===2)map[idx(nx,ny)]=1;
      }
    }
  }
});

// Assign building sprites
for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++){
  const t=map[idx(x,y)];
  if(t===3){
    buildingSpriteMap[idx(x,y)]=8; // wall
  }else if(t===2){
    // Check if at landmark center
    let isLandmark=false;
    for(const lm of LANDMARKS){
      const dx=x-lm.tx,dy=y-lm.ty;
      if(dx===0&&dy===0){
        buildingSpriteMap[idx(x,y)]=SPRITE_INDEX.indexOf(lm.sprite);
        isLandmark=true;
        break;
      }
    }
    if(!isLandmark){
      // Check proximity to landmarks for themed housing
      let closest=null,closestDist=Infinity;
      for(const lm of LANDMARKS){
        const d=Math.sqrt((x-lm.tx)**2+(y-lm.ty)**2);
        if(d<closestDist){closestDist=d;closest=lm}
      }
      if(closestDist<8){
        if(closest.key==="tavern")buildingSpriteMap[idx(x,y)]=rng()<0.4?2:14; // house_a or house_d
        else if(closest.key==="foundry")buildingSpriteMap[idx(x,y)]=rng()<0.5?2:9; // house_a or slum_tenement
        else if(closest.key==="church")buildingSpriteMap[idx(x,y)]=rng()<0.5?3:14; // house_b or house_d
        else if(closest.key==="cathedral")buildingSpriteMap[idx(x,y)]=rng()<0.5?4:14; // house_c or house_d
        else if(closest.key==="watchtower")buildingSpriteMap[idx(x,y)]=rng()<0.5?4:9; // house_c or slum_tenement
        else if(closest.key==="arena")buildingSpriteMap[idx(x,y)]=rng()<0.4?16:9; // black_market or slum_tenement
        else if(closest.key==="market")buildingSpriteMap[idx(x,y)]=rng()<0.4?16:(rng()<0.5?3:14); // black_market, house_b, or house_d
        else buildingSpriteMap[idx(x,y)]=rng()<0.5?3:14;
      }else{
        const r=rng();
        if(r<0.25)buildingSpriteMap[idx(x,y)]=2; // house_a
        else if(r<0.45)buildingSpriteMap[idx(x,y)]=3; // house_b
        else if(r<0.60)buildingSpriteMap[idx(x,y)]=14; // house_d
        else if(r<0.75)buildingSpriteMap[idx(x,y)]=9; // slum_tenement
        else if(r<0.85)buildingSpriteMap[idx(x,y)]=4; // house_c
        else buildingSpriteMap[idx(x,y)]=16; // black_market
      }
    }
  }
}

// Place wells at road intersections
for(let y=3;y<MAP-3;y++)for(let x=3;x<MAP-3;x++){
  if(map[idx(x,y)]!==1)continue;
  if(buildingSpriteMap[idx(x,y)]!==0)continue;
  // Check if it's a crossroads (road in all 4 cardinal dirs)
  const n=map[idx(x,y-1)]===1,s=map[idx(x,y+1)]===1,e=map[idx(x+1,y)]===1,w=map[idx(x-1,y)]===1;
  if(n&&s&&e&&w&&rng()<0.12){
    map[idx(x,y)]=2;
    buildingSpriteMap[idx(x,y)]=15; // well
  }
}

/* ── PLAYER ── */
const player={x:58,y:52,vx:0,vy:0};
const discovered=new Set();

/* ── NPCs ── */
const npcs=[];
for(let i=0;i<NPC_COUNT;i++){
  let nx,ny;
  do{nx=15+Math.floor(rng()*90);ny=15+Math.floor(rng()*90)}while(map[idx(nx,ny)]!==1);
  npcs.push({x:nx+rng(),y:ny+rng(),dir:rng()*Math.PI*2,timer:rng()*3,speed:0.4+rng()*0.6});
}

/* ── RAIN ── */
const rain=[];
for(let i=0;i<RAIN_COUNT;i++){
  rain.push({x:rng()*W,y:rng()*H,speed:300+rng()*400,len:12+rng()*20,alpha:0.1+rng()*0.25});
}

/* ── INPUT ── */
const keys={};
window.addEventListener("keydown",e=>{keys[e.code]=true;if(e.code==="KeyE")interact()});
window.addEventListener("keyup",e=>{keys[e.code]=false});

const isTouch="ontouchstart"in window;
if(isTouch){
  document.getElementById("touchDpad").style.display="block";
  document.getElementById("touchInteract").style.display="block";
  const touchKeys={tbUp:"KeyW",tbDown:"KeyS",tbLeft:"KeyA",tbRight:"KeyD"};
  Object.entries(touchKeys).forEach(([id,code])=>{
    const btn=document.getElementById(id);
    btn.addEventListener("touchstart",e=>{e.preventDefault();keys[code]=true},{passive:false});
    btn.addEventListener("touchend",e=>{e.preventDefault();keys[code]=false},{passive:false});
    btn.addEventListener("touchcancel",e=>{keys[code]=false});
  });
  document.getElementById("touchInteract").addEventListener("touchstart",e=>{e.preventDefault();interact()},{passive:false});
}

// Gamepad
let gpIdx=null;
window.addEventListener("gamepadconnected",e=>{gpIdx=e.gamepad.index});
window.addEventListener("gamepaddisconnected",()=>{gpIdx=null});

/* ── INTERACT ── */
let popupOpen=false;
const popupEl=document.getElementById("districtPopup");
const popTitle=document.getElementById("popTitle");
const popLore=document.getElementById("popLore");
document.getElementById("popClose").addEventListener("click",()=>{popupEl.style.display="none";popupOpen=false});
popupEl.addEventListener("click",e=>{if(e.target===popupEl){popupEl.style.display="none";popupOpen=false}});

function interact(){
  if(popupOpen){popupEl.style.display="none";popupOpen=false;return}
  const near=nearestLandmark();
  if(near&&near.dist<4){
    popTitle.textContent=near.lm.name;
    popLore.textContent=near.lm.lore;
    popupEl.style.display="block";
    popupOpen=true;
    discovered.add(near.lm.key);
    updateDiscovery();
  }
}

function nearestLandmark(){
  let best=null,bestD=Infinity;
  for(const lm of LANDMARKS){
    const d=Math.sqrt((player.x-lm.tx)**2+(player.y-lm.ty)**2);
    if(d<bestD){bestD=d;best={lm,dist:d}}
  }
  return best;
}

function updateDiscovery(){
  document.getElementById("discovery").textContent=`Districts: ${discovered.size}/7`;
}
updateDiscovery();

/* ── CONTROLS DISPLAY ── */
document.getElementById("controls").textContent=isTouch?STR.controls_touch:STR.controls_kb;
if(DEV)document.getElementById("devOverlay").style.display="block";

/* ── CAMERA ── */
let camX=0,camY=0;

/* ── BUILDING RENDER LIST ── */
// Pre-compute building positions
const buildings=[];
for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++){
  const si=buildingSpriteMap[idx(x,y)];
  if(si>0){
    const spriteName=SPRITE_INDEX[si];
    // Check if landmark center
    let isLandmarkCenter=false;
    let landmarkData=null;
    for(const lm of LANDMARKS){
      if(lm.tx===x&&lm.ty===y){isLandmarkCenter=true;landmarkData=lm;break}
    }
    const scale=isLandmarkCenter?1.5:1.0;
    buildings.push({tx:x,ty:y,sprite:spriteName,scale,depth:x+y,isLandmark:isLandmarkCenter,landmark:landmarkData});
  }
}

/* ── MINIMAP ── */
const mmCanvas=document.getElementById("minimap");
const mmCtx=mmCanvas.getContext("2d");
const MMW=160,MMH=160;
const mmScale=MMW/MAP;

function drawMinimap(){
  mmCtx.fillStyle="#0a0a18";
  mmCtx.fillRect(0,0,MMW,MMH);
  // Draw map tiles (very small)
  for(let y=0;y<MAP;y+=2)for(let x=0;x<MAP;x+=2){
    const t=map[idx(x,y)];
    if(t===0)mmCtx.fillStyle="#1a2a1a";
    else if(t===1)mmCtx.fillStyle="#2a2a30";
    else if(t===2)mmCtx.fillStyle="#3a3040";
    else if(t===3)mmCtx.fillStyle="#4a4050";
    else if(t===4)mmCtx.fillStyle="#1a2040";
    else continue;
    mmCtx.fillRect(x*mmScale,y*mmScale,mmScale*2,mmScale*2);
  }
  // Landmarks
  for(const lm of LANDMARKS){
    mmCtx.fillStyle=discovered.has(lm.key)?"#8af":"#446";
    mmCtx.fillRect(lm.tx*mmScale-2,lm.ty*mmScale-2,5,5);
  }
  // Player
  mmCtx.fillStyle="#ff4";
  mmCtx.fillRect(player.x*mmScale-2,player.y*mmScale-2,4,4);
}

/* ── GAME LOOP ── */
const DT=1/60;
let lastTime=performance.now();
let fpsFrames=0,fpsTime=0,fpsVal=0;

// Hide loading
document.getElementById("loading").style.opacity="0";
setTimeout(()=>{document.getElementById("loading").style.display="none"},600);

function tick(now){
  requestAnimationFrame(tick);
  const elapsed=(now-lastTime)/1000;
  lastTime=now;

  // FPS
  fpsFrames++;fpsTime+=elapsed;
  if(fpsTime>=1){fpsVal=fpsFrames;fpsFrames=0;fpsTime=0}
  if(DEV)document.getElementById("devOverlay").textContent=`FPS: ${fpsVal} | Pos: ${player.x.toFixed(1)},${player.y.toFixed(1)}`;

  // ── INPUT ──
  let mx=0,my=0;
  if(keys["KeyW"]||keys["ArrowUp"])my=-1;
  if(keys["KeyS"]||keys["ArrowDown"])my=1;
  if(keys["KeyA"]||keys["ArrowLeft"])mx=-1;
  if(keys["KeyD"]||keys["ArrowRight"])mx=1;

  // Gamepad
  if(gpIdx!==null){
    const gp=navigator.getGamepads()[gpIdx];
    if(gp){
      if(Math.abs(gp.axes[0])>0.2)mx+=gp.axes[0];
      if(Math.abs(gp.axes[1])>0.2)my+=gp.axes[1];
      if(gp.buttons[0]&&gp.buttons[0].pressed)interact();
    }
  }

  // Normalize
  const mag=Math.sqrt(mx*mx+my*my);
  if(mag>0){mx/=mag;my/=mag}

  if(!popupOpen){
    const nx=player.x+mx*PLAYER_SPEED*DT;
    const ny=player.y+my*PLAYER_SPEED*DT;
    const ti=Math.floor(nx),tj=Math.floor(ny);
    if(inBounds(ti,tj)){
      const t=map[idx(ti,tj)];
      if(t===1||t===2){player.x=nx;player.y=ny}
    }
  }

  // NPC update
  for(const npc of npcs){
    npc.timer-=DT;
    if(npc.timer<=0){npc.dir=rng()*Math.PI*2;npc.timer=1+rng()*3}
    const nnx=npc.x+Math.cos(npc.dir)*npc.speed*DT;
    const nny=npc.y+Math.sin(npc.dir)*npc.speed*DT;
    const nti=Math.floor(nnx),ntj=Math.floor(nny);
    if(inBounds(nti,ntj)&&map[idx(nti,ntj)]===1){npc.x=nnx;npc.y=nny}
    else{npc.dir+=Math.PI;npc.timer=0.5}
  }

  // Interaction hint
  const near=nearestLandmark();
  const hintEl=document.getElementById("interactHint");
  if(near&&near.dist<4&&!popupOpen){
    hintEl.textContent=`${near.lm.name} — ${STR.press_interact}`;
    hintEl.style.display="block";
    // Auto-discover
    if(near.dist<3&&!discovered.has(near.lm.key)){
      discovered.add(near.lm.key);
      updateDiscovery();
    }
  }else{
    hintEl.style.display="none";
  }

  // ── CAMERA ──
  const ps=toScreen(player.x,player.y);
  camX=ps.x-W/2;
  camY=ps.y-H/2;

  // ── RENDER ──
  ctx.fillStyle="#0a0a12";
  ctx.fillRect(0,0,W,H);

  // Visible tile range
  const margin=4;
  const topLeft=toWorld(camX-TW,camY-TH*6);
  const topRight=toWorld(camX+W+TW,camY-TH*6);
  const botLeft=toWorld(camX-TW,camY+H+TH*2);
  const botRight=toWorld(camX+W+TW,camY+H+TH*2);
  const minTX=Math.max(0,Math.floor(Math.min(topLeft.x,topRight.x,botLeft.x,botRight.x))-margin);
  const maxTX=Math.min(MAP-1,Math.ceil(Math.max(topLeft.x,topRight.x,botLeft.x,botRight.x))+margin);
  const minTY=Math.max(0,Math.floor(Math.min(topLeft.y,topRight.y,botLeft.y,botRight.y))-margin);
  const maxTY=Math.min(MAP-1,Math.ceil(Math.max(topLeft.y,topRight.y,botLeft.y,botRight.y))+margin);

  // Draw ground tiles
  for(let ty=minTY;ty<=maxTY;ty++){
    for(let tx=minTX;tx<=maxTX;tx++){
      const t=map[idx(tx,ty)];
      const sc=toScreen(tx,ty);
      const sx=sc.x-camX,sy=sc.y-camY;

      if(t===4){
        const wave=Math.sin(now*0.002+tx*0.3+ty*0.3)*3;
        ctx.fillStyle="#121830";
        ctx.beginPath();
        ctx.moveTo(sx,sy-TH/2+wave);
        ctx.lineTo(sx+TW/2,sy);
        ctx.lineTo(sx,sy+TH/2);
        ctx.lineTo(sx-TW/2,sy);
        ctx.closePath();
        ctx.fill();
        continue;
      }
      if(t===0){
        ctx.fillStyle="#141f14";
        ctx.beginPath();
        ctx.moveTo(sx,sy-TH/2);
        ctx.lineTo(sx+TW/2,sy);
        ctx.lineTo(sx,sy+TH/2);
        ctx.lineTo(sx-TW/2,sy);
        ctx.closePath();
        ctx.fill();
        continue;
      }
      // Sprite-based ground for types 1,2,3
      let groundSpriteName;
      if(t===1){
        const h=((tx*2654435761)^(ty*2246822519))>>>0;
        const pct=(h%1000)/1000;
        // Check proximity to any landmark for neon boost
        let nearLandmark=false;
        for(const lm of LANDMARKS){
          const ddx=tx-lm.tx,ddy=ty-lm.ty;
          if(ddx*ddx+ddy*ddy<64){nearLandmark=true;break}
        }
        if(nearLandmark&&pct<0.20) groundSpriteName="ground_neon";
        else if(pct<0.60) groundSpriteName="ground_cobble";
        else if(pct<0.80) groundSpriteName="ground_dirt";
        else if(pct<0.90) groundSpriteName="ground_puddle";
        else if(pct<0.95) groundSpriteName="ground_grate";
        else groundSpriteName="ground_plaza";
      }else if(t===2){
        const h2=((tx*374761393)^(ty*668265263))>>>0;
        groundSpriteName=(h2%3===0)?"ground_plaza":"ground_cobble";
      }else if(t===3){
        groundSpriteName="ground_plaza";
      }else{continue}
      const gSpr=sprites[groundSpriteName];
      if(gSpr){
        ctx.drawImage(gSpr,sx-TW/2,sy-TH/2,TW,TH);
      }else{
        ctx.fillStyle="#222228";
        ctx.beginPath();
        ctx.moveTo(sx,sy-TH/2);
        ctx.lineTo(sx+TW/2,sy);
        ctx.lineTo(sx,sy+TH/2);
        ctx.lineTo(sx-TW/2,sy);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  // ── DEPTH-SORTED RENDERABLES ──
  const playerDepth=player.x+player.y;
  const renderables=[];

  // Player
  renderables.push({type:"player",depth:playerDepth,tx:player.x,ty:player.y});

  // NPCs
  for(const npc of npcs){
    const d=npc.x+npc.y;
    renderables.push({type:"npc",depth:d,tx:npc.x,ty:npc.y,npc});
  }

  // Buildings in view
  for(const b of buildings){
    if(b.tx>=minTX-3&&b.tx<=maxTX+3&&b.ty>=minTY-3&&b.ty<=maxTY+3){
      renderables.push({type:"building",depth:b.depth,building:b});
    }
  }

  // Sort back-to-front
  renderables.sort((a,b)=>a.depth-b.depth);

  // Render
  for(const r of renderables){
    if(r.type==="building"){
      const b=r.building;
      const sp=sprites[b.sprite];
      if(!sp)continue;
      const sc=toScreen(b.tx,b.ty);
      const sx=sc.x-camX,sy=sc.y-camY;

      // Base sprite draw size
      const baseW=TW*1.4*b.scale;
      const baseH=(sp.height/sp.width)*baseW;

      const drawX=sx-baseW/2;
      const drawY=sy-baseH+TH/2;

      // Transparency for buildings in front of player
      if(b.depth>playerDepth){
        const pdx=b.tx-player.x,pdy=b.ty-player.y;
        const pdist=Math.sqrt(pdx*pdx+pdy*pdy);
        if(pdist<3){ctx.globalAlpha=0.3}
      }

      ctx.drawImage(sp,drawX,drawY,baseW,baseH);
      ctx.globalAlpha=1.0;

      // Landmark label
      if(b.isLandmark){
        ctx.font="bold 13px 'Segoe UI',Arial,sans-serif";
        ctx.textAlign="center";
        ctx.fillStyle=discovered.has(b.landmark.key)?"#8af":"#556";
        ctx.shadowColor="#48f";
        ctx.shadowBlur=discovered.has(b.landmark.key)?8:0;
        ctx.fillText(b.landmark.name,sx,drawY-6);
        ctx.shadowBlur=0;
      }
    }else if(r.type==="player"){
      const sc=toScreen(r.tx,r.ty);
      const sx=sc.x-camX,sy=sc.y-camY;
      // Robed figure - simple shapes
      // Shadow
      ctx.globalAlpha=0.3;
      ctx.fillStyle="#000";
      ctx.beginPath();
      ctx.ellipse(sx,sy+4,10,5,0,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
      // Body (robe)
      ctx.fillStyle="#3a3060";
      ctx.fillRect(sx-6,sy-22,12,20);
      // Head
      ctx.fillStyle="#d8c8a0";
      ctx.fillRect(sx-4,sy-28,8,8);
      // Hood
      ctx.fillStyle="#2a2050";
      ctx.fillRect(sx-5,sy-30,10,6);
      // Glow
      ctx.globalAlpha=0.15;
      ctx.fillStyle="#8af";
      ctx.beginPath();
      ctx.arc(sx,sy-20,14,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    }else if(r.type==="npc"){
      const sc=toScreen(r.tx,r.ty);
      const sx=sc.x-camX,sy=sc.y-camY;
      // Simple NPC figure
      ctx.globalAlpha=0.3;
      ctx.fillStyle="#000";
      ctx.beginPath();
      ctx.ellipse(sx,sy+3,7,3,0,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=0.7;
      ctx.fillStyle="#444455";
      ctx.fillRect(sx-4,sy-16,8,14);
      ctx.fillStyle="#998877";
      ctx.fillRect(sx-3,sy-20,6,5);
      ctx.globalAlpha=1;
    }
  }

  // ── RAIN ──
  ctx.strokeStyle="rgba(140,170,220,0.2)";
  ctx.lineWidth=1;
  for(const drop of rain){
    drop.y+=drop.speed*DT;
    drop.x-=drop.speed*0.15*DT;
    if(drop.y>H){drop.y=-drop.len;drop.x=rng()*W}
    if(drop.x<-20)drop.x=W+20;
    ctx.globalAlpha=drop.alpha;
    ctx.beginPath();
    ctx.moveTo(drop.x,drop.y);
    ctx.lineTo(drop.x-drop.len*0.15,drop.y+drop.len);
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  // ── VIGNETTE ──
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.75);
  vg.addColorStop(0,"rgba(0,0,0,0)");
  vg.addColorStop(1,"rgba(0,0,0,0.55)");
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);

  // ── MINIMAP ──
  drawMinimap();
}

requestAnimationFrame(tick);
</script>
</body>
</html>
